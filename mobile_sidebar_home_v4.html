
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .app-shell {
    width: 390px; height: 780px;
    background: var(--color-background-tertiary);
    position: relative; overflow: hidden;
    border-radius: var(--border-radius-lg);
    border: 0.5px solid var(--color-border-tertiary);
    font-family: var(--font-sans);
  }

  .topbar {
    height: 56px;
    background: var(--color-background-primary);
    border-bottom: 0.5px solid var(--color-border-tertiary);
    display: flex; align-items: center;
    padding: 0 16px; gap: 12px;
    position: relative; z-index: 10;
  }
  .topbar-logo { font-size: 16px; font-weight: 500; color: var(--color-text-primary); flex: 1; }
  .hamburger {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: var(--border-radius-md);
    cursor: pointer; border: none; background: transparent;
    color: var(--color-text-secondary);
  }
  .hamburger:hover { background: var(--color-background-secondary); }

  .main-content {
    height: calc(780px - 56px);
    display: flex; align-items: center; justify-content: center;
    color: var(--color-text-tertiary); font-size: 14px;
  }

  .overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 20; opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .sidebar {
    position: absolute; top: 0; left: 0;
    width: 272px; height: 100%;
    background: var(--color-background-primary);
    z-index: 30;
    transform: translateX(-100%);
    transition: transform 0.25s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
    border-right: 0.5px solid var(--color-border-tertiary);
  }
  .sidebar.open { transform: translateX(0); }

  .sidebar-header {
    padding: 20px 16px 16px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-logo { font-size: 16px; font-weight: 500; color: var(--color-text-primary); }
  .close-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: var(--border-radius-md);
    cursor: pointer; border: none; background: transparent;
    color: var(--color-text-secondary);
  }
  .close-btn:hover { background: var(--color-background-secondary); }

  .sidebar-nav {
    flex: 1; overflow-y: auto;
    padding: 12px 10px;
    display: flex; flex-direction: column; gap: 4px;
  }

  .nav-item {
    display: flex; align-items: center;
    padding: 10px 12px;
    border-radius: var(--border-radius-md);
    cursor: pointer;
    color: var(--color-text-primary);
    font-size: 14px; font-weight: 400;
    gap: 12px;
    user-select: none;
    transition: background 0.15s;
    border: none;
    background: transparent;
    outline: none;
    -webkit-appearance: none;
    width: 100%; text-align: left; text-decoration: none;
    box-shadow: none;
  }
  .nav-item:hover { background: var(--color-background-secondary); }
  .nav-item.active { background: var(--color-background-secondary); font-weight: 500; }

  .nav-icon {
    width: 20px; height: 20px; flex-shrink: 0;
    fill: var(--color-text-secondary);
  }
  .nav-item.active .nav-icon { fill: var(--color-text-primary); }

  .nav-label { flex: 1; }

  .chevron {
    width: 16px; height: 16px; flex-shrink: 0;
    fill: var(--color-text-tertiary);
    transition: transform 0.2s;
  }
  .chevron.rotated { transform: rotate(180deg); }

  .dropdown {
    overflow: hidden; max-height: 0;
    transition: max-height 0.22s ease;
    display: flex; flex-direction: column; gap: 4px;
  }
  .dropdown.open { max-height: 300px; }

  .dropdown-item {
    display: flex; align-items: center;
    padding: 9px 12px 9px 44px;
    border-radius: var(--border-radius-md);
    cursor: pointer;
    color: var(--color-text-secondary);
    font-size: 13px;
    transition: background 0.15s;
    text-decoration: none;
  }
  .dropdown-item:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }

  .badge {
    background: var(--color-background-info);
    color: var(--color-text-info);
    font-size: 11px; font-weight: 500;
    padding: 2px 7px; border-radius: 20px;
  }

  .nav-divider {
    height: 0.5px;
    background: var(--color-border-tertiary);
    margin: 4px 4px; flex-shrink: 0;
  }
</style>

<div class="app-shell">
  <div class="topbar">
    <button class="hamburger" id="menuBtn" aria-label="Open menu">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" clip-rule="evenodd" d="M2 4.75A.75.75 0 012.75 4h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 4.75zm0 10.5a.75.75 0 01.75-.75h7.5a.75.75 0 010 1.5h-7.5a.75.75 0 01-.75-.75zM2 10a.75.75 0 01.75-.75h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 10z"/></svg>
    </button>
    <span class="topbar-logo">MyApp</span>
  </div>

  <div class="main-content">Home page content goes here</div>
  <div class="overlay" id="overlay"></div>

  <aside class="sidebar" id="sidebar" aria-label="Main navigation">
    <div class="sidebar-header">
      <span class="sidebar-logo">MyApp</span>
      <button class="close-btn" id="closeBtn" aria-label="Close menu">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
      </button>
    </div>

    <nav class="sidebar-nav">

      <a class="nav-item active" href="#">
        <svg class="nav-icon" viewBox="0 0 20 20"><path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"/><path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z"/></svg>
        <span class="nav-label">Home</span>
      </a>

      <button class="nav-item" id="bundlesToggle" aria-expanded="false">
        <svg class="nav-icon" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a4 4 0 00-4 4v1H5a1 1 0 00-.994.89l-1 9A1 1 0 004 18h12a1 1 0 00.994-1.11l-1-9A1 1 0 0015 7h-1V6a4 4 0 00-4-4zm2 5V6a2 2 0 10-4 0v1h4zm-6 3a1 1 0 112 0 1 1 0 01-2 0zm7-1a1 1 0 100 2 1 1 0 000-2z" clip-rule="evenodd"/></svg>
        <span class="nav-label">Bundles</span>
        <svg class="chevron" id="bundlesChevron" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
      </button>
      <div class="dropdown" id="bundlesDropdown">
        <a class="dropdown-item" href="#">All bundles</a>
        <a class="dropdown-item" href="#">Featured</a>
        <a class="dropdown-item" href="#">Deals</a>
      </div>

      <button class="nav-item" id="subsToggle" aria-expanded="false">
        <svg class="nav-icon" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
        <span class="nav-label">Subscription</span>
        <svg class="chevron" id="subsChevron" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
      </button>
      <div class="dropdown" id="subsDropdown">
        <a class="dropdown-item" href="#">My plan</a>
        <a class="dropdown-item" href="#">Upgrade</a>
        <a class="dropdown-item" href="#">Billing history</a>
      </div>

      <a class="nav-item" href="#">
        <svg class="nav-icon" viewBox="0 0 20 20"><path d="M3 1a1 1 0 000 2h1.22l.305 1.222a.997.997 0 00.01.042l1.358 5.43-.893.892C3.74 11.846 4.632 14 6.414 14H15a1 1 0 000-2H6.414l1-1H14a1 1 0 00.894-.553l3-6A1 1 0 0017 3H6.28l-.31-1.243A1 1 0 005 1H3zM16 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM6.5 18a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/></svg>
        <span class="nav-label">Store</span>
      </a>

      <div class="nav-divider"></div>

      <a class="nav-item" href="#">
        <svg class="nav-icon" viewBox="0 0 20 20"><path d="M8.707 7.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l2-2a1 1 0 00-1.414-1.414L11 7.586V3a1 1 0 10-2 0v4.586l-.293-.293z"/><path d="M3 5a2 2 0 012-2h1a1 1 0 010 2H5v7h2l1 2h4l1-2h2V5h-1a1 1 0 110-2h1a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V5z"/></svg>
        <span class="nav-label">Refer &amp; earn</span>
        <span class="badge">New</span>
      </a>

    </nav>
  </aside>
</div>

<script>
  const menuBtn = document.getElementById('menuBtn');
  const closeBtn = document.getElementById('closeBtn');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');

  function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('open'); }
  function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }

  menuBtn.addEventListener('click', openSidebar);
  closeBtn.addEventListener('click', closeSidebar);
  overlay.addEventListener('click', closeSidebar);

  function setupDropdown(toggleId, dropdownId, chevronId) {
    const toggle = document.getElementById(toggleId);
    const dropdown = document.getElementById(dropdownId);
    const chevron = document.getElementById(chevronId);
    toggle.addEventListener('click', () => {
      const isOpen = dropdown.classList.toggle('open');
      chevron.classList.toggle('rotated', isOpen);
      toggle.setAttribute('aria-expanded', isOpen);
    });
  }

  setupDropdown('bundlesToggle', 'bundlesDropdown', 'bundlesChevron');
  setupDropdown('subsToggle', 'subsDropdown', 'subsChevron');
</script>
