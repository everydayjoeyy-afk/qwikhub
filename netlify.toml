[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# 1. Proxy Supabase API calls through Netlify's CDN edge (must come FIRST)
#    Browser -> Netlify CDN (fast) -> Supabase (server-to-server, fast)
[[redirects]]
  from = "/sb-proxy/*"
  to = "https://uihiihiusqquzjprxuyw.supabase.co/:splat"
  status = 200
  force = true

# 2. SPA catch-all — serve index.html for every other route (must come LAST)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
